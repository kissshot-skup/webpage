<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: "THE YYYY ブログ" }}</title>
  
  <!-- Bootstrap & Fontawesome -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #fdfbf7;
      --card-bg: #ffffff;
      --text-main: #5c5552;
      --text-muted: #9c9794;
      --primary-color: #92b5a9;
      --glass-bg: rgba(253, 251, 247, 0.85);
      --glass-border: rgba(255, 255, 255, 0.5);
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Nunito', 'M PLUS Rounded 1c', sans-serif;
      padding-top: 100px;
      line-height: 1.8;
    }
    .navbar.fixed-top {
      background: var(--glass-bg) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    }
    .navbar-dark .navbar-brand {
      color: var(--text-main) !important;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    /* 記事コンテンツ用スタイル */
    .article-container {
      max-width: 800px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
      margin-bottom: 50px;
    }
    .article-container h1 {
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text-main);
      font-size: 2rem;
    }
    .article-container h2 {
      font-weight: 700;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      color: var(--text-main);
      border-bottom: 2px solid var(--primary-color);
      padding-bottom: 0.5rem;
    }
    .article-container h3 {
      font-weight: 700;
      margin-top: 2rem;
      margin-bottom: 1rem;
      color: var(--text-main);
    }
    .article-container a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: bold;
    }
    .article-container a:hover {
      text-decoration: underline;
    }
    .article-container img {
      max-width: 100%;
      border-radius: 12px;
      margin: 20px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .article-container pre {
      background-color: #f4f2ee;
      padding: 15px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 20px 0;
    }
    .article-container code {
      font-family: 'Consolas', monospace;
      color: #d16e6e;
      background-color: #f4f2ee;
      padding: 2px 6px;
      border-radius: 6px;
    }
    .article-container pre code {
      color: inherit;
      background-color: transparent;
      padding: 0;
    }
    .article-container blockquote {
      border-left: 5px solid var(--primary-color);
      padding-left: 15px;
      color: var(--text-muted);
      margin: 20px 0;
      background: #faf9f6;
      padding: 15px;
      border-radius: 0 12px 12px 0;
    }
    .btn-back {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--primary-color);
      font-weight: bold;
      text-decoration: none;
      border: 2px solid var(--primary-color);
      padding: 8px 20px;
      border-radius: 50px;
      transition: all 0.3s ease;
      background: var(--card-bg);
    }
    .btn-back:hover {
      background-color: var(--primary-color);
      color: white;
      text-decoration: none;
      transform: translateX(-5px);
    }
    @media (max-width: 768px) {
      .article-container {
        padding: 20px;
        border-radius: 16px;
      }
      .article-container h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <!-- ナビゲーションバー -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid container">
      <a class="navbar-brand" href="https://kissshot-skup.github.io/webpage/">THE YYYY（ザ・イヤーズ）</a>
    </div>
  </nav>

  <main class="container">
    <div>
      <a href="https://kissshot-skup.github.io/webpage/" class="btn-back"><i class="fas fa-arrow-left"></i> トップページへ戻る</a>
    </div>
    
    <div class="article-container">
      {{ content }}
    </div>
  </main>
</body>
</html>
